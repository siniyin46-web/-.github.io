<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>临江仙·梦后楼台高锁 - 晏几道</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&family=Noto+Serif+SC:wght@300;400;600;700&display=swap');

  * { margin:0; padding:0; box-sizing:border-box; }

  :root {
    --ink: #2c2416;
    --ink-light: #6b5e4a;
    --paper: #f5f0e6;
    --paper-dark: #e8dcc8;
    --seal: #c44240;
    --gold: #a68b5b;
  }

  body {
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Noto Serif SC', 'STSong', 'SimSun', 'Songti SC', serif;
    background: #f5f0e6;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
    margin: 0;
    padding: 0;
  }

  /* === 主画心 === */
  .painting {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    height: 100dvh;
    background:
      radial-gradient(ellipse at 20% 15%, rgba(139,119,90,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 75% 60%, rgba(139,119,90,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 40% 85%, rgba(139,119,90,0.07) 0%, transparent 50%),
      linear-gradient(175deg, #f7f2e8 0%, #f3ecdd 30%, #efe7d4 60%, #f2ebd9 100%);
    border-radius: 0;
    box-shadow: inset 0 0 120px rgba(139,119,90,0.05);
    padding: 50px 32px 44px;
    overflow: hidden;
    z-index: 1;
  }

  /* 纸纹纹理 */
  .painting::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0.35;
    pointer-events: none;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(139,119,90,0.03) 2px, rgba(139,119,90,0.03) 3px),
      repeating-linear-gradient(90deg, transparent, transparent 3px, rgba(139,119,90,0.02) 3px, rgba(139,119,90,0.02) 4px);
    z-index: 0;
  }

  .painting::after {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
      radial-gradient(circle at 15% 20%, rgba(160,130,90,0.06) 0%, transparent 40%),
      radial-gradient(circle at 85% 75%, rgba(160,130,90,0.05) 0%, transparent 35%);
    z-index: 0;
  }

  .painting > * { position: relative; z-index: 1; }

  /* === 内容居中容器 === */
  .painting-content {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: clamp(60px, 14vh, 160px) 28px clamp(50px, 10vh, 120px);
    z-index: 2;
    pointer-events: none;
  }

  .painting-content > * {
    pointer-events: auto;
  }

  /* === 顶部水墨山水 === */
  .ink-mountains-top {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: clamp(100px, 16vh, 180px);
    overflow: hidden;
    z-index: 1;
  }

  .ink-mountains-top svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  .mountain {
    animation: mountainRise 1.8s cubic-bezier(0.22, 0.61, 0.36, 1) both;
  }
  .mountain:nth-child(1) { animation-delay: 0.1s; }
  .mountain:nth-child(2) { animation-delay: 0.3s; }
  .mountain:nth-child(3) { animation-delay: 0.5s; }
  .mountain:nth-child(4) { animation-delay: 0.7s; }

  @keyframes mountainRise {
    from { opacity:0; transform:translateY(30px); }
    to   { opacity:1; transform:translateY(0); }
  }

  /* === 词牌名 === */
  .cipai {
    text-align: center;
    margin-bottom: 4px;
    width: 100%;
  }

  .cipai-main {
    font-family: 'Ma Shan Zheng', 'STKaiti', 'KaiTi', 'KaiTi SC', cursive;
    font-size: 38px;
    color: var(--ink);
    letter-spacing: 10px;
    text-shadow: 1px 1px 1px rgba(0,0,0,0.08);
    animation: inkSpread 1.5s ease-out both;
    animation-delay: 0.6s;
  }

  .cipai-sub {
    font-family: 'Noto Serif SC', 'STSong', 'Songti SC', serif;
    font-size: 14px;
    color: var(--ink-light);
    letter-spacing: 6px;
    margin-top: 4px;
    animation: inkSpread 1.5s ease-out both;
    animation-delay: 0.8s;
  }

  @keyframes inkSpread {
    from { opacity:0; filter:blur(8px); letter-spacing:20px; }
    to   { opacity:1; filter:blur(0); letter-spacing:10px; }
  }

  @keyframes inkSpreadSub {
    from { opacity:0; filter:blur(6px); letter-spacing:16px; }
    to   { opacity:1; filter:blur(0); letter-spacing:6px; }
  }

  /* === 作者 === */
  .author {
    text-align: center;
    margin-bottom: 28px;
  }

  .author-text {
    font-family: 'Noto Serif SC', 'STKaiti', 'KaiTi', serif;
    font-size: 13px;
    color: var(--ink-light);
    letter-spacing: 4px;
    opacity: 0;
    animation: fadeUp 1.2s ease-out 1s forwards;
  }

  .author-text .dot {
    display: inline-block;
    width: 4px; height: 4px;
    background: var(--ink-light);
    border-radius: 50%;
    margin: 0 8px;
    vertical-align: middle;
    opacity: 0.5;
  }

  @keyframes fadeUp {
    from { opacity:0; transform:translateY(8px); }
    to   { opacity:1; transform:translateY(0); }
  }

  /* === 分隔线 === */
  .divider {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 32px;
    opacity: 0;
    animation: fadeUp 1.2s ease-out 1.15s forwards;
  }

  .divider-line {
    width: 40px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .divider-diamond {
    width: 5px; height: 5px;
    background: var(--gold);
    transform: rotate(45deg);
    opacity: 0.5;
  }

  /* === 词文主体 === */
  .poem {
    display: flex;
    flex-direction: column;
    gap: 0;
    margin-bottom: 28px;
    line-height: 2.3;
  }

  .poem-line {
    font-family: 'Noto Serif SC', 'STKaiti', 'KaiTi', 'KaiTi SC', serif;
    font-size: 17px;
    font-weight: 350;
    color: var(--ink);
    letter-spacing: 3px;
    opacity: 0;
    transform: translateY(12px);
    animation: verseReveal 1s ease-out forwards;
    text-indent: 0;
    position: relative;
    transition: color 0.3s;
  }

  /* 上阕 */
  .poem-line:nth-child(1)  { animation-delay:1.3s; }
  .poem-line:nth-child(2)  { animation-delay:1.5s; }
  .poem-line:nth-child(3)  { animation-delay:1.7s; }
  .poem-line:nth-child(4)  { animation-delay:1.9s; }
  .poem-line:nth-child(5)  { animation-delay:2.1s; }

  /* 下阕 */
  .poem-line:nth-child(6)  { animation-delay:2.6s; }
  .poem-line:nth-child(7)  { animation-delay:2.8s; }
  .poem-line:nth-child(8)  { animation-delay:3.0s; }
  .poem-line:nth-child(9)  { animation-delay:3.2s; }
  .poem-line:nth-child(10) { animation-delay:3.4s; }

  /* 断句 */
  .stanza-break {
    height: 18px;
    opacity: 0;
    animation: fadeUp 1s ease-out 2.35s forwards;
  }

  @keyframes verseReveal {
    0%   { opacity:0; transform:translateY(14px); filter:blur(4px); }
    60%  { opacity:0.95; transform:translateY(-1px); filter:blur(0); }
    100% { opacity:0.88; transform:translateY(0); filter:blur(0); }
  }

  /* 名句高亮 */
  .poem-line.famous {
    color: #1a1008;
    font-weight: 500;
    letter-spacing: 4px;
    position: relative;
  }

  .poem-line.famous::after {
    content: '';
    position: absolute;
    bottom: 2px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(196,66,64,0.3), transparent);
    animation: underlineReveal 1.2s ease-out 2.8s forwards;
  }

  @keyframes underlineReveal {
    to { width:70%; }
  }

  /* === 印章 === */
  .seal {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 10px;
    opacity: 0;
    animation: fadeUp 1.2s ease-out 3.8s forwards;
  }

  .seal-stamp {
    width: 48px;
    height: 48px;
    border: 1.8px solid var(--seal);
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    transform: rotate(8deg);
    position: relative;
  }

  .seal-stamp::before {
    content: '';
    position: absolute;
    inset: 3px;
    border: 0.6px solid rgba(196,66,64,0.4);
    border-radius: 2px;
  }

  .seal-text {
    font-family: 'Ma Shan Zheng', 'STKaiti', 'KaiTi', serif;
    font-size: 16px;
    color: var(--seal);
    letter-spacing: 1px;
    writing-mode: vertical-rl;
  }

  /* === 底部水墨 === */
  .ink-mountains-bot {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: clamp(70px, 10vh, 120px);
    overflow: hidden;
    opacity: 0;
    animation: fadeUp 1.2s ease-out 2s forwards;
    z-index: 1;
  }

  .ink-mountains-bot svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* === 飘落花瓣 === */
  .petals {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 3;
    overflow: hidden;
  }

  .petal {
    position: absolute;
    top: -30px;
    animation: petalFall linear infinite;
  }

  .petal:nth-child(1)  { left:3%;  animation-duration:11s; animation-delay:0s; }
  .petal:nth-child(2)  { left:10%; animation-duration:13s; animation-delay:2s; }
  .petal:nth-child(3)  { left:18%; animation-duration:10s; animation-delay:5s; }
  .petal:nth-child(4)  { left:25%; animation-duration:14s; animation-delay:1s; }
  .petal:nth-child(5)  { left:32%; animation-duration:12s; animation-delay:4s; }
  .petal:nth-child(6)  { left:40%; animation-duration:15s; animation-delay:0.5s; }
  .petal:nth-child(7)  { left:48%; animation-duration:11s; animation-delay:3s; }
  .petal:nth-child(8)  { left:55%; animation-duration:13s; animation-delay:6s; }
  .petal:nth-child(9)  { left:62%; animation-duration:10s; animation-delay:1.5s; }
  .petal:nth-child(10) { left:70%; animation-duration:14s; animation-delay:4.5s; }
  .petal:nth-child(11) { left:78%; animation-duration:12s; animation-delay:2.5s; }
  .petal:nth-child(12) { left:85%; animation-duration:15s; animation-delay:0s; }
  .petal:nth-child(13) { left:92%; animation-duration:11s; animation-delay:3.5s; }
  .petal:nth-child(14) { left:15%; animation-duration:16s; animation-delay:7s; }
  .petal:nth-child(15) { left:58%; animation-duration:9s;  animation-delay:5.5s; }
  .petal:nth-child(16) { left:35%; animation-duration:17s; animation-delay:8s; }
  .petal:nth-child(17) { left:88%; animation-duration:13s; animation-delay:6.5s; }
  .petal:nth-child(18) { left:50%; animation-duration:12s; animation-delay:1s; }
  .petal:nth-child(19) { left:22%; animation-duration:14s; animation-delay:3s; }
  .petal:nth-child(20) { left:68%; animation-duration:11s; animation-delay:7.5s; }

  @keyframes petalFall {
    0%   { transform:translateY(-5vh) translateX(0) rotate(0deg) scale(1); opacity:0; }
    8%   { opacity:0.7; }
    15%  { transform:translateY(15vh) translateX(30px) rotate(72deg) scale(0.95); opacity:0.65; }
    35%  { transform:translateY(35vh) translateX(-20px) rotate(180deg) scale(0.9); opacity:0.55; }
    55%  { transform:translateY(55vh) translateX(40px) rotate(260deg) scale(0.8); opacity:0.4; }
    75%  { transform:translateY(75vh) translateX(-15px) rotate(330deg) scale(0.7); opacity:0.2; }
    90%  { transform:translateY(92vh) translateX(10px) rotate(380deg) scale(0.6); opacity:0.06; }
    100% { transform:translateY(105vh) translateX(0) rotate(420deg) scale(0.5); opacity:0; }
  }

  /* === 双燕 === */
  .swallows {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 3;
    overflow: hidden;
  }

  .swallow {
    position: absolute;
    animation: swallowFly 18s ease-in-out infinite;
  }

  .swallow svg {
    width: 36px;
    height: auto;
    opacity: 0.35;
  }

  .swallow:nth-child(1) {
    top: 18%;
    left: -50px;
    animation-delay: 2s;
    animation-duration: 16s;
  }

  .swallow:nth-child(2) {
    top: 28%;
    left: -60px;
    animation-delay: 7s;
    animation-duration: 19s;
  }

  .swallow:nth-child(3) {
    top: 38%;
    left: -45px;
    animation-delay: 4s;
    animation-duration: 17s;
  }

  @keyframes swallowFly {
    0%   { transform:translate(0, 0) rotate(0deg); }
    10%  { transform:translate(12vw, -25px) rotate(4deg); }
    25%  { transform:translate(28vw, -55px) rotate(-6deg); }
    40%  { transform:translate(45vw, -20px) rotate(5deg); }
    55%  { transform:translate(60vw, -50px) rotate(-4deg); }
    70%  { transform:translate(75vw, -30px) rotate(7deg); }
    85%  { transform:translate(90vw, -45px) rotate(-2deg); }
    100% { transform:translate(110vw, -10px) rotate(3deg); }
  }

  /* === 双人像 === */
  .figures {
    position: fixed;
    bottom: clamp(50px, 9vh, 100px);
    left: 50%;
    transform: translateX(-50%);
    pointer-events: none;
    z-index: 3;
    opacity: 0;
    animation: figureFadeIn 2s ease-out 3.8s forwards;
  }

  .figures svg {
    width: clamp(100px, 20vw, 150px);
    height: auto;
  }

  @keyframes figureFadeIn {
    from { opacity:0; transform:translateX(-50%) translateY(16px); }
    to   { opacity:1; transform:translateX(-50%) translateY(0); }
  }

  /* === 明月 === */
  .moon {
    position: fixed;
    top: 6%;
    right: 10%;
    pointer-events: none;
    z-index: 0;
    opacity: 0;
    animation: moonRise 2s ease-out 3.5s forwards;
  }

  .moon-disc {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 40%, rgba(255,250,240,0.5) 0%, rgba(240,225,190,0.18) 50%, transparent 70%);
    box-shadow:
      0 0 30px rgba(255,245,220,0.25),
      0 0 60px rgba(255,240,210,0.1),
      0 0 100px rgba(240,220,180,0.06);
  }

  @keyframes moonRise {
    from { opacity:0; transform:translateY(20px); }
    to   { opacity:1; transform:translateY(0); }
  }

  /* === 按钮区 === */
  .controls {
    position: fixed;
    bottom: clamp(16px, 3vh, 28px);
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    gap: 16px;
    align-items: center;
  }

  .btn {
    font-family: 'Noto Serif SC', 'STKaiti', 'KaiTi', serif;
    font-size: 12px;
    letter-spacing: 2px;
    color: rgba(80,60,30,0.7);
    background: rgba(245,240,230,0.6);
    border: 0.6px solid rgba(139,119,90,0.3);
    padding: 8px 20px;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.4s;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }

  .btn:hover {
    color: rgba(44,36,22,0.9);
    border-color: rgba(139,119,90,0.5);
    background: rgba(245,240,230,0.8);
  }

  .btn:active {
    transform: scale(0.96);
    transition: transform 0.1s;
  }

  /* === 竖排模式 === */
  .painting.vertical .poem {
    writing-mode: vertical-rl;
    flex-direction: row;
    gap: 14px;
    align-items: center;
    max-height: 70vh;
    max-height: 70dvh;
    overflow-x: auto;
    padding: 10px 0;
    -webkit-overflow-scrolling: touch;
  }

  .painting.vertical .poem::-webkit-scrollbar { height:2px; }
  .painting.vertical .poem::-webkit-scrollbar-thumb { background:rgba(139,119,90,0.2); border-radius:1px; }

  .painting.vertical .poem-line {
    font-size: 18px;
    letter-spacing: 6px;
  }

  .painting.vertical .stanza-break {
    width: 18px;
    height: 0;
  }

  .painting.vertical .cipai-main {
    writing-mode: vertical-rl;
    font-size: 34px;
    letter-spacing: 12px;
  }

  /* === 响应式 === */
  @media (max-width:380px) {
    .painting-content { padding: 50px 20px 40px; }
    .cipai-main { font-size:32px; letter-spacing:8px; }
    .poem-line { font-size:15.5px; letter-spacing:2px; }
    .painting.vertical .poem-line { font-size:16.5px; letter-spacing:5px; }
  }

  @media (min-width:768px) {
    .painting-content { padding: 80px 48px 60px; }
    .poem-line { font-size:20px; letter-spacing:5px; }
    .painting.vertical .poem-line { font-size:22px; letter-spacing:8px; }
    .moon-disc { width:56px; height:56px; }
    .cipai-main { font-size:44px; }
  }

  /* === 加载淡入 === */
  @keyframes globalFadeIn {
    from { opacity:0; }
    to   { opacity:1; }
  }
</style>
</head>
<body>

      <div class="poem-line">梦后楼台高锁，</div>
      <div class="poem-line">酒醒帘幕低垂。</div>
      <div class="poem-line">去年春恨却来时，</div>
      <div class="poem-line famous">落花人独立，</div>
      <div class="poem-line famous">微雨燕双飞。</div>
      <div class="stanza-break"></div>
      <div class="poem-line">记得小苹初见，</div>
      <div class="poem-line">两重心字罗衣。</div>
      <div class="poem-line">琵琶弦上说相思，</div>
      <div class="poem-line">当时明月在，</div>
      <div class="poem-line">曾照彩云归。</div>
    </div>

<script>
  function toggleOrientation() {
    document.getElementById('painting').classList.toggle('vertical');
  }

  function resetAnim() {
    const p = document.getElementById('painting');
    const poem = document.getElementById('poem');
    const lines = poem.querySelectorAll('.poem-line, .stanza-break');
    const animElements = p.querySelectorAll('.poem-line, .stanza-break, .cipai-main, .cipai-sub, .author-text, .divider, .seal, .ink-mountains-bot, .mountain');

    animElements.forEach(el => {
      el.style.animation = 'none';
      el.offsetHeight;
      el.style.animation = '';
    });
  }

  document.addEventListener('DOMContentLoaded', () => {
    // 初始化微交互：点击词句加重显示
    document.querySelectorAll('.poem-line').forEach(line => {
      line.addEventListener('click', function() {
        const wasActive = this.style.opacity === '1';
        document.querySelectorAll('.poem-line').forEach(l => {
          l.style.opacity = '0.88';
          l.style.color = 'var(--ink)';
          l.style.fontWeight = '350';
        });
        if (!wasActive) {
          this.style.opacity = '1';
          this.style.color = '#1a1008';
          this.style.fontWeight = '500';
        }
      });
    });
  });
</script>
